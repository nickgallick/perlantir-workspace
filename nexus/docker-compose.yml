# ============================================================
# Nexus v1 — Docker Compose
# 2 services: app (Nexus API) + postgres (PostgreSQL 17 + pgvector)
# ============================================================

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev
      POSTGRES_DB: nexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nexus:nexus_dev@postgres:5432/nexus
      PORT: "3000"
      # Set NEXUS_API_KEY to enable authentication:
      # NEXUS_API_KEY: your-secret-key-here
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
